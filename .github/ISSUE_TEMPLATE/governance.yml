name: Governance Proposal
description: Propose a change to foundation governance, policy, or structure
title: "[Governance] "
labels: ["governance"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What are you proposing? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you rule them out?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who does this affect, and how?
    validations:
      required: false
